services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: locus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d locus"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - locus-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - locus-redis-data:/data

volumes:
  locus-postgres-data:
  locus-redis-data:
